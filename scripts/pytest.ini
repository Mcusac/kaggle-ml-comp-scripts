[pytest]
# Pytest configuration for Kaggle ML Competition Scripts

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude non-test files that match test patterns
norecursedirs = .git __pycache__ .pytest_cache *.egg-info

# Exclude specific files that are not tests
# test_pipeline.py is a pipeline function, not a test
testpaths = layers/layer_2_devtools/level_1_impl/tests
