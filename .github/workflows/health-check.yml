name: Code Health Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: health-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt || true
    
    - name: Run health check
      run: |
        python scripts/dev/scripts/check_health.py \
          --root input/kaggle-ml-comp-scripts \
          --json > health_report.json
    
    - name: CSIRO contest tier imports
      working-directory: scripts
      run: |
        python dev/scan_csiro_level_violations.py
    
    - name: Check thresholds
      run: |
        python scripts/dev/scripts/check_health_thresholds.py \
          --report health_report.json
    
    - name: Pretty print report
      if: always()
      run: |
        python -m json.tool health_report.json > health_report_pretty.json
    
    - name: Upload health report artifacts
      uses: actions/upload-artifact@v4
      with:
        name: health-report
        path: |
          health_report.json
          health_report_pretty.json
        if-no-files-found: error
        compression-level: 6
    
    - name: Publish summary
      if: always()
      run: |
        echo "## Code Health Report" >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        cat health_report.json >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY